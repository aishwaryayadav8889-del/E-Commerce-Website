<!DOCTYPE html>
<html>
<head>
    <title>E-Commerce Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🛒 Simple E-Commerce Store</h1>

<h2>Products</h2>

<div id="products">

    <div class="card">
        <h3>Headphones</h3>
        <p>₹999</p>
        <button onclick="addToCart('Headphones')">Add to Cart</button>
    </div>

    <div class="card">
        <h3>Smart Watch</h3>
        <p>₹1999</p>
        <button onclick="addToCart('Smart Watch')">Add to Cart</button>
    </div>

    <div class="card">
        <h3>Laptop Bag</h3>
        <p>₹1499</p>
        <button onclick="addToCart('Laptop Bag')">Add to Cart</button>
    </div>

</div>

<h2>Cart</h2>

<ul id="cart"></ul>

<p><strong>Total Items:</strong> <span id="count">0</span></p>

<script src="script.js"></script>

</body>
</html>
